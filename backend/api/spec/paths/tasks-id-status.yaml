# /v1/tasks/{id}/status
patch:
  summary: 'Change status of task'
  tags:
    - 'Tasks'
  parameters:
    - name: id
      type: integer
      in: path
      required: true
    - name: body
      in: body
      required: true
      schema:
        $ref: '../definitions/tasks.yaml#/Status'
  responses:
    '204':
      description: 'ok'
    '500':
      description: 'internal error'
      schema:
        $ref: '../definitions/errors.yaml#/APIError'